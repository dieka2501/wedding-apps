<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Check In — Putri & Dikdik</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --navy:   #151d45;
      --orange: #C9611A;
      --beige:  #CEC4B6;
      --tan:    #B9A583;
      --pure:   #ffffff;
      --green:  #2d7a4f;
      --red:    #b0392e;
    }
    body{
      background:var(--navy);
      color:var(--pure);
      font-family:'DM Sans', sans-serif;
      font-weight:300;
      min-height:100svh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:2rem 1.25rem;
    }

    /* ── Header ─────────────────────────────────────────── */
    .header{
      text-align:center;
      margin-bottom:2.5rem;
    }
    .header-label{
      font-size:.6rem;
      letter-spacing:.28em;
      text-transform:uppercase;
      color:var(--tan);
      opacity:.8;
      margin-bottom:.5rem;
    }
    .header-title{
      font-family:'Cormorant Garamond', serif;
      font-size:1.8rem;
      font-weight:600;
      color:var(--pure);
      letter-spacing:.05em;
    }

    /* ── Card ───────────────────────────────────────────── */
    .card{
      width:100%;
      max-width:420px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.1);
      border-radius:16px;
      padding:2.5rem 2rem;
      text-align:center;
      backdrop-filter:blur(8px);
    }

    /* ── Status icon ────────────────────────────────────── */
    .status-icon{
      width:72px;
      height:72px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      margin:0 auto 1.5rem;
      font-size:2rem;
    }
    .status-icon.success{ background:rgba(45,122,79,.25); border:2px solid var(--green); }
    .status-icon.warning{ background:rgba(176,57,46,.2);  border:2px solid var(--red);   }
    .status-icon.loading{ background:rgba(201,97,26,.15); border:2px solid var(--orange); animation:pulse 1.5s ease-in-out infinite; }
    .status-icon.error  { background:rgba(176,57,46,.2);  border:2px solid var(--red);   }

    @keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── Content ────────────────────────────────────────── */
    .badge{
      display:inline-block;
      font-size:.55rem;
      letter-spacing:.2em;
      text-transform:uppercase;
      padding:.3rem .9rem;
      border-radius:99px;
      margin-bottom:1.25rem;
      font-weight:500;
    }
    .badge.new     { background:rgba(45,122,79,.25);  color:#6dd99a; border:1px solid rgba(45,122,79,.4); }
    .badge.repeat  { background:rgba(176,57,46,.2);   color:#f09090; border:1px solid rgba(176,57,46,.4); }
    .badge.loading { background:rgba(201,97,26,.15);  color:#f0aa70; border:1px solid rgba(201,97,26,.3); }
    .badge.invalid { background:rgba(176,57,46,.2);   color:#f09090; border:1px solid rgba(176,57,46,.4); }

    .guest-name{
      font-family:'Cormorant Garamond', serif;
      font-size:clamp(1.8rem, 6vw, 2.6rem);
      font-weight:600;
      color:var(--pure);
      line-height:1.2;
      margin-bottom:1.5rem;
    }

    .info-row{
      display:flex;
      flex-direction:column;
      gap:.3rem;
      background:rgba(255,255,255,.06);
      border-radius:10px;
      padding:1rem 1.25rem;
      margin-bottom:.75rem;
    }
    .info-label{
      font-size:.55rem;
      letter-spacing:.22em;
      text-transform:uppercase;
      color:var(--tan);
      opacity:.7;
    }
    .info-value{
      font-size:.95rem;
      color:var(--pure);
      font-weight:400;
    }
    .info-value.highlight{ color:#f0aa70; font-weight:500; }

    .msg-text{
      font-size:.85rem;
      line-height:1.7;
      color:rgba(255,255,255,.6);
      margin-top:1.25rem;
    }

    /* ── Footer ─────────────────────────────────────────── */
    .footer{
      margin-top:2rem;
      font-size:.58rem;
      letter-spacing:.15em;
      text-transform:uppercase;
      color:rgba(255,255,255,.25);
      text-align:center;
    }
  </style>
</head>
<body>

  <div class="header">
    <p class="header-label">Pernikahan</p>
    <h1 class="header-title">Putri &amp; Dikdik</h1>
  </div>

  <div class="card" id="card">
    <!-- Diisi oleh JS -->
    <div class="status-icon loading">⏳</div>
    <span class="badge loading">Memverifikasi…</span>
    <p class="guest-name" id="guest-name">—</p>
  </div>

  <p class="footer">Sabtu, 2 Mei 2026 &nbsp;·&nbsp; Check-In Petugas</p>

<script>
(async () => {
  const params = new URLSearchParams(window.location.search);
  const token  = params.get('token');
  const card   = document.getElementById('card');

  function render({ icon, iconClass, badgeText, badgeClass, name, rows, msg }) {
    card.innerHTML = `
      <div class="status-icon ${iconClass}">${icon}</div>
      <span class="badge ${badgeClass}">${badgeText}</span>
      <p class="guest-name">${name}</p>
      ${rows.map(r => `
        <div class="info-row">
          <span class="info-label">${r.label}</span>
          <span class="info-value ${r.highlight ? 'highlight' : ''}">${r.value}</span>
        </div>`).join('')}
      ${msg ? `<p class="msg-text">${msg}</p>` : ''}
    `;
  }

  function fmtDate(iso) {
    return new Date(iso).toLocaleString('id-ID', {
      timeZone: 'Asia/Jakarta',
      weekday: 'long', year: 'numeric', month: 'long',
      day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit',
    });
  }

  if (!token) {
    render({
      icon: '✕', iconClass: 'error',
      badgeText: 'Token Tidak Ditemukan', badgeClass: 'invalid',
      name: '—',
      rows: [],
      msg: 'URL tidak valid. Pastikan QR code dipindai dengan benar.',
    });
    return;
  }

  try {
    const res = await fetch('/api/checkin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token }),
    });
    const data = await res.json();

    if (!res.ok || !data.success) {
      render({
        icon: '✕', iconClass: 'error',
        badgeText: 'Token Tidak Valid', badgeClass: 'invalid',
        name: '—',
        rows: [],
        msg: data.message || 'Token undangan tidak ditemukan atau tidak valid.',
      });
      return;
    }

    if (data.alreadyCheckedIn) {
      render({
        icon: '⚠', iconClass: 'warning',
        badgeText: 'Sudah Check In', badgeClass: 'repeat',
        name: data.name,
        rows: [
          { label: 'Check in pertama', value: fmtDate(data.checkinAt), highlight: true },
        ],
        msg: 'Tamu ini sudah melakukan check in sebelumnya.',
      });
    } else {
      render({
        icon: '✓', iconClass: 'success',
        badgeText: 'Check In Berhasil', badgeClass: 'new',
        name: data.name,
        rows: [
          { label: 'Waktu check in', value: fmtDate(data.checkinAt), highlight: false },
        ],
        msg: 'Selamat datang! Silakan persilakan tamu masuk.',
      });
    }
  } catch (e) {
    render({
      icon: '✕', iconClass: 'error',
      badgeText: 'Gagal Terhubung', badgeClass: 'invalid',
      name: '—',
      rows: [],
      msg: 'Tidak dapat terhubung ke server. Periksa koneksi internet.',
    });
  }
})();
</script>
</body>
</html>
